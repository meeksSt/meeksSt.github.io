<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Beer Calculator</title>
        <link rel="icon" type="image/svg" href="/images/favicon.svg">
    </head>
    <body>
        <main>
            <section>
                <div class="container">
                    <div class="styles">
                        <button class="btn active--style" id="bristford">Bristford Ale</button>
                        <button class="btn" id="hallbruck">Hallbruck Hellas</button>
                        <button class="btn" id="cascadear">Cascadear IPA</button>
                        <button class="btn" id="gravenford">Gravenford Stout</button>
                        <button class="btn" id="frosthaven">Frosthaven Witbier</button>
                        <button class="btn" id="sunvalen">Sunvalen Saison</button>
                    </div>

                    <div class="properties">
                        <button class="btn-small" id="refreshment">Refreshment</button>
                        <button class="btn-small" id="heaviness">Heaviness</button>
                        <button class="btn-small" id="lightness">Lightness</button>
                        <button class="btn-small" id="acidity">Acidity</button>
                        <button class="btn-small" id="sweetness">Sweetness</button>
                    </div>

                    <div class="recipes"></div>
                </div>
            </section>
        </main>
        
        <script type="module" src="script.js"></script>
    </body>
</html>
